version: '3.8'

services:
  app:
    build: .
    container_name: mcp-app
    ports:
      - "3000:3000"

  scanner:
    image: sonarsource/sonar-scanner-cli
    container_name: sonar-scanner
    env_file:
      - .env
    volumes:
      - .:/usr/src
    working_dir: /usr/src

  mcp-server:
    build: ./mcp-server
    container_name: mcp-server
    ports:
      - "4000:4000"
    env_file:
      - .env